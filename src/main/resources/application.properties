spring.application.name=DRIVERHUB

# Use the exact variable name you set in Render
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Correct Dialect for Neon (PostgreSQL)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload Limits (Using sensible defaults)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Ensure Hibernate uses PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# --- JWT Security Settings ---
# A long, random string (at least 64 characters for HS512)
app.jwt.secret=4f7a6292b3a9c8d7e6f5a4b3c2d1e0f9a8b7c6d5e4f3a2b1c0d9e8f7a6b5c4d3210fedcba9876543210abcdef0123456789abcdef0123456789abcde
#app.jwt.secret=${JWT_SECRET}
#app.api.key=${ADMIN_API_KEY}
# Token validity (86400000 ms = 24 hours)
app.jwt.expirationMs=86400000

# --- API Key Settings ---
# The key you will provide to external systems or admin scripts
# Custom API Security Key
passenger.api.key=PASSENGER_KEY_2026
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# --- Server Security ---
# Optional: Disables the default password generated by Spring Security on startup
spring.main.allow-bean-definition-overriding=true

spring.mail.host={SPRING_MAIL_HOST}
spring.mail.port=587
spring.mail.username={SPRING_MAIL_USERNAME}
spring.mail.password={SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true