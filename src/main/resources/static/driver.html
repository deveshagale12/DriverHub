<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard | Private Car Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight"><i class="fas fa-car-side mr-2"></i>Driver<span class="text-blue-400">Hub</span></h1>
            <div id="navActions" class="hidden">
                <button onclick="location.reload()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm font-medium transition">Logout</button>
            </div>
        </div>
    </nav>

    <div id="authSection" class="container mx-auto mt-10 px-4">
        <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="p-8">
                <div id="loginForm">
                    <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Driver Login</h2>
                    <div class="space-y-4">
                        <input type="email" id="loginEmail" placeholder="Email Address" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                        <input type="password" id="loginPass" placeholder="Password" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                        <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition duration-300">Login</button>
                    </div>
                    <p class="mt-6 text-center text-slate-500">New driver? <a href="#" onclick="toggleAuth()" class="text-blue-600 font-semibold hover:underline">Apply here</a></p>
                </div>

                <div id="registerForm" class="hidden">
                    <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">Driver Registration</h2>
                    <p class="text-slate-500 text-center mb-6 text-sm">Join our fleet and start earning</p>
                    <div class="space-y-3">
                        <input type="text" id="regName" placeholder="Full Name" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900">
                        <input type="email" id="regEmail" placeholder="Email Address" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900">
                        <input type="password" id="regPass" placeholder="Set Password" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900">
                        <input type="text" id="regLicense" placeholder="License Number" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-900">
                        <div class="pt-2 border-t border-slate-100 mt-2">
                            <p class="text-xs font-bold text-slate-400 uppercase mb-2">Vehicle Details</p>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" id="vModel" placeholder="Model" class="p-3 border border-slate-200 rounded-xl outline-none">
                                <input type="text" id="vPlate" placeholder="Plate #" class="p-3 border border-slate-200 rounded-xl outline-none">
                            </div>
                        </div>
                        <button onclick="handleRegister()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl mt-4 transition">Submit Application</button>
                    </div>
                    <p class="mt-4 text-center text-slate-500"><a href="#" onclick="toggleAuth()" class="text-slate-700 font-semibold hover:underline">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard" class="container mx-auto mt-6 px-4 hidden">
        <div class="bg-white rounded-2xl shadow-md p-6 mb-6 flex flex-wrap justify-between items-center gap-4">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Welcome, <span id="driverNameDisplay">Driver</span>!</h2>
                <div class="flex items-center mt-1">
                    <span id="statusLabel" class="px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs font-bold tracking-wider uppercase mr-2">PENDING</span>
                    <p class="text-slate-400 text-sm"><i class="fas fa-location-arrow mr-1"></i> Live Tracking Active</p>
                </div>
            </div>
            <button onclick="fetchTrips()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2 rounded-xl font-bold transition"><i class="fas fa-sync-alt mr-2"></i>Refresh Trips</button>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <h3 class="text-lg font-bold text-slate-700 mb-4 flex items-center">
                    <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span> Available Requests
                </h3>
                <div id="availableTrips" class="space-y-4">
                    </div>
            </div>

            <div id="activeRideSection" class="hidden">
                <h3 class="text-lg font-bold text-green-600 mb-4 flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-ping mr-2"></span> On-Going Trip
                </h3>
                <div id="activeTripDetails" class="bg-white rounded-2xl p-6 shadow-lg border-t-4 border-green-500">
                    </div>
            </div>
        </div>
    </div>

   <script>
    const API_KEY = "PASSENGER_KEY_2026";
    let currentDriver = null;

    function toggleAuth() {
        document.getElementById('loginForm').classList.toggle('hidden');
        document.getElementById('registerForm').classList.toggle('hidden');
    }

    // 1. LOGIN
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPass').value;
        try {
            const res = await fetch(`/api/drivers/login?email=${email}&password=${password}`, { 
                method: 'POST', 
                headers: { 'X-API-KEY': API_KEY } 
            });
            if (res.ok) {
                currentDriver = await res.json();
                setupDashboard();
            } else {
                const msg = await res.text();
                alert(msg || "Login Failed");
            }
        } catch (e) { alert("Server Error connecting to API"); }
    }

    // 2. REGISTRATION
    async function handleRegister() {
        const payload = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPass').value,
            licenseNumber: document.getElementById('regLicense').value,
            vehicle: {
                model: document.getElementById('vModel').value,
                plateNumber: document.getElementById('vPlate').value
            }
        };
        const res = await fetch('/api/drivers/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-API-KEY': API_KEY },
            body: JSON.stringify(payload)
        });
        if (res.ok) {
            alert("Application submitted! Contact admin for approval.");
            toggleAuth();
        }
    }

    function setupDashboard() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('navActions').classList.remove('hidden');
        document.getElementById('driverNameDisplay').innerText = currentDriver.name;
        document.getElementById('statusLabel').innerText = currentDriver.status;
        
        if(currentDriver.status === 'CONFIRMED') {
            document.getElementById('statusLabel').className = "px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold tracking-wider uppercase mr-2";
        }
        startLocationUpdates();
        fetchTrips();
    }

    function startLocationUpdates() {
        setInterval(() => {
            navigator.geolocation.getCurrentPosition(async pos => {
                currentDriver.latitude = pos.coords.latitude;
                currentDriver.longitude = pos.coords.longitude;
                await fetch(`/api/drivers/${currentDriver.id}/update-location?lat=${pos.coords.latitude}&lng=${pos.coords.longitude}`, {
                    method: 'PATCH',
                    headers: { 'X-API-KEY': API_KEY }
                });
            });
        }, 10000);
    }

    // 3. FETCH AVAILABLE TRIPS
    async function fetchTrips() {
        try {
            const res = await fetch(`/api/trips/available`, { headers: { 'X-API-KEY': API_KEY } });
            const trips = await res.json();
            let html = '';
            trips.forEach(t => {
                const dist = (currentDriver.latitude && t.passenger.latitude) 
                    ? `~${calculateDistance(currentDriver.latitude, currentDriver.longitude, t.passenger.latitude, t.passenger.longitude).toFixed(1)} km` 
                    : 'Location Pending';

                html += `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">New Request</span>
                        <span class="text-sm font-bold text-slate-500">${dist}</span>
                    </div>
                    <p class="text-sm text-slate-600 mb-1"><i class="fas fa-user text-blue-400 mr-2 w-4"></i>${t.passenger.name}</p>
                    <p class="text-sm text-slate-600"><i class="fas fa-map-marker-alt text-red-400 mr-2 w-4"></i>${t.pickupLocation}</p>
                    <p class="text-sm text-slate-600 mt-1"><i class="fas fa-flag-checkered text-green-400 mr-2 w-4"></i>${t.dropLocation}</p>
                    <button onclick="acceptTrip(${t.id})" class="w-full mt-4 bg-blue-600 text-white py-2 rounded-xl font-bold hover:bg-blue-700 transition">Accept Ride</button>
                </div>`;
            });
            document.getElementById('availableTrips').innerHTML = html || '<div class="text-center p-10 text-slate-400">Waiting for passengers...</div>';
        } catch (e) { console.error("Failed to fetch trips", e); }
    }
    async function startTrip(id) {
        try {
            const res = await fetch(`/api/trips/${id}/start`, { 
                method: 'PATCH', 
                headers: { 'X-API-KEY': API_KEY } 
            });
            if (res.ok) {
                const updatedTrip = await res.json();
                alert("Trip Started! You are now on the way to the destination.");
                showActiveTrip(updatedTrip); // Refresh the UI to update badge and buttons
            }
        } catch (e) {
            alert("Error starting trip. Check connection.");
        }
    }
    // 4. ACCEPT TRIP (FIXED)
    async function acceptTrip(tripId) {
        const res = await fetch(`/api/trips/${tripId}/accept/${currentDriver.id}`, {
            method: 'PATCH',
            headers: { 'X-API-KEY': API_KEY }
        });
        if(res.ok) {
            const trip = await res.json();
            showActiveTrip(trip);
        } else {
            alert("Could not accept trip. It may have expired or been taken.");
        }
    }

    function showActiveTrip(trip) {
        document.getElementById('activeRideSection').classList.remove('hidden');
        const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${trip.passenger.latitude},${trip.passenger.longitude}`;
        
        document.getElementById('activeTripDetails').innerHTML = `
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <h4 class="font-bold text-slate-800 italic">Route Details</h4>
                    <a href="${navUrl}" target="_blank" class="text-xs bg-blue-600 text-white px-3 py-1 rounded-full font-bold">
                       <i class="fas fa-directions mr-1"></i> Navigate
                    </a>
                </div>
                <div class="relative pl-6 border-l-2 border-slate-200 space-y-6">
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase">Pickup</p>
                        <p class="text-slate-800 font-semibold">${trip.pickupLocation}</p>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase">Destination</p>
                        <p class="text-slate-800 font-semibold">${trip.dropLocation}</p>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="startTrip(${trip.id})" class="bg-emerald-500 text-white py-3 rounded-xl font-bold">Start Trip</button>
                <button onclick="completeTrip(${trip.id})" class="bg-slate-900 text-white py-3 rounded-xl font-bold">End Trip</button>
            </div>
        `;
    }

    // 5. TRIP CONTROLS
   function showActiveTrip(trip) {
    document.getElementById('activeRideSection').classList.remove('hidden');
    
    // Determine badge color and button states based on status
    const isStarted = trip.status === 'STARTED';
    const statusColor = isStarted ? 'bg-emerald-500' : 'bg-blue-500';
    const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${trip.passenger.latitude},${trip.passenger.longitude}`;

    document.getElementById('activeTripDetails').innerHTML = `
        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <h4 class="font-bold text-slate-800 italic">Route Details</h4>
                    <span id="tripStatusBadge" class="px-2 py-0.5 rounded text-[10px] font-black text-white uppercase ${statusColor} animate-pulse">
                        ${trip.status}
                    </span>
                </div>
                <a href="${navUrl}" target="_blank" class="text-xs bg-slate-800 text-white px-3 py-1 rounded-full font-bold">
                   <i class="fas fa-location-arrow mr-1"></i> Navigate
                </a>
            </div>

            <div class="relative pl-6 border-l-2 border-slate-200 space-y-6">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase">Pickup Location</p>
                    <p class="text-slate-800 font-semibold">${trip.pickupLocation}</p>
                </div>
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase">Destination</p>
                    <p class="text-slate-800 font-semibold">${trip.dropLocation}</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mt-8">
            <button onclick="startTrip(${trip.id})" 
                id="startBtn"
                ${isStarted ? 'disabled' : ''} 
                class="bg-emerald-500 text-white py-3 rounded-xl font-bold disabled:opacity-30 disabled:cursor-not-allowed transition shadow-lg shadow-emerald-100">
                Start Trip
            </button>
            <button onclick="completeTrip(${trip.id})" 
                id="endBtn"
                ${!isStarted ? 'disabled' : ''} 
                class="bg-slate-900 text-white py-3 rounded-xl font-bold disabled:opacity-30 disabled:cursor-not-allowed transition">
                End Trip
            </button>
        </div>
        ${!isStarted ? '<p class="text-[10px] text-center text-slate-400 mt-2">You must Start Trip before you can End it.</p>' : ''}
    `;
}

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }
</script>
</body>
</html>
